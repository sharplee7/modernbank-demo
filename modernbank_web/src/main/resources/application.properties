server.port = 8090
server.servlet.context-path = /modernbank

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.view.viewClass=org.springframework.web.servlet.view.JstlView

# CQRS enalbe
cqrs-enable=true

# Accont API URL
account.api.url = http://${ACCOUNT}/modernbank/account

# Customer API URL
customer.api.url = http://${CUSTOMER}/modernbank/customer

# Transfer API URL
transfer.api.url = http://${TRANSFER}/modernbank/transfer

# CQRS API URL
cqrs.api.url = http://${CQRS}/modernbank/cqrs

#### environment ####
ACCOUNT=localhost:8081
B2BT=localhost:8082
CUSTOMER=localhost:8083
CQRS=localhost:8084
TRANSFER=localhost:8085
KAFKA=localhost:9092
POSTGRES=localhost:5432