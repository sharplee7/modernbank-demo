<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login22222
        
    </h2>
    <form id="loginForm">
        <label for="user_id">User ID:</label>
        <input type="text" id="user_id" name="user_id" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
    <p id="errorMessage" style="color: red;"></p>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userData = {
                user_id: document.getElementById('user_id').value,
                password: document.getElementById('password').value
            };

            fetch('http://localhost:8091/modernbank/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(userData),
                credentials: 'include' // 이 옵션을 추가하여 쿠키를 포함시킵니다
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('errorMessage').textContent = data.error;
                } else {
                    // 로그인 성공 시 쿠키 설정 확인
                    console.log('Login successful. Cookies:', document.cookie);
                    window.location.href = 'http://localhost:8083/modernbank/customer/welcome';
                }
            })
            .catch((error) => {
                console.error('Error:', error);
                document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
            });
        });
    </script>
</body>
</html>
